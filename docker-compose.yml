# Unified Business Agent - Docker Compose
# Team Sleepyhead - Nasiko Hackathon 2026

services:
  unified-business-agent:
    build: .
    image: unified-business-agent:latest
    container_name: unified-business-agent
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Keep explicit defaults while still loading full env from .env
      GROQ_MODEL_PRIMARY: ${GROQ_MODEL_PRIMARY:-llama-3.3-70b-versatile}
      GROQ_MODEL_SECONDARY: ${GROQ_MODEL_SECONDARY:-llama-3.1-70b-versatile}
      MONGODB_URI: mongodb://mongodb:27017/
      MONGODB_DATABASE: ${MONGODB_DATABASE:-BusinessAgentDB}
      USE_MONGODB: "true"
      FALLBACK_DB_PATH: /app/data/business_agent_db.json
      GOOGLE_CREDENTIALS_PATH: ${GOOGLE_CREDENTIALS_PATH:-/app/credentials/google_credentials.json}
      GMAIL_CREDENTIALS_PATH: ${GMAIL_CREDENTIALS_PATH:-/app/credentials/google_credentials.json}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
      USE_MOCK_CALENDAR: ${USE_MOCK_CALENDAR:-true}
      USE_MOCK_GMAIL: ${USE_MOCK_GMAIL:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      # Mount credentials (if available)
      - ./credentials:/app/credentials:ro
      # Mount data directories (persistent storage)
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mongodb:
    image: mongo:7.0
    container_name: uba-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-BusinessAgentDB}
    volumes:
      - mongodb-data:/data/db
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  mongodb-data:
